<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400" role="img" aria-label="Corney's Automotive Services">
  <defs>
    <style><![CDATA[
      @keyframes corneys-gear-rotate {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      .corneys-gear-spin {
        transform-box: fill-box;
        transform-origin: center;
        animation: corneys-gear-rotate 10s linear infinite;
      }
      @media (prefers-reduced-motion: reduce) {
        .corneys-gear-spin { animation: none; }
      }
    ]]></style>

    <!-- Chrome text gradient (silver → darker bottom) -->
    <linearGradient id="chromeText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="40%"  stop-color="#E6E6E6"/>
      <stop offset="70%"  stop-color="#8A8A8A"/>
      <stop offset="100%" stop-color="#4A4A4A"/>
    </linearGradient>

    <!-- Metallic body gradient (vertical light→dark) -->
    <linearGradient id="gearBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#EDEDED"/>
      <stop offset="38%"  stop-color="#B0B0B0"/>
      <stop offset="72%"  stop-color="#606060"/>
      <stop offset="100%" stop-color="#2E2E2E"/>
    </linearGradient>

    <!-- Tooth gradient slightly lighter than body -->
    <linearGradient id="gearTooth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F4F4F4"/>
      <stop offset="50%"  stop-color="#9A9A9A"/>
      <stop offset="100%" stop-color="#3E3E3E"/>
    </linearGradient>

    <!-- Inner hub radial -->
    <radialGradient id="gearHub" cx="38%" cy="32%" r="70%">
      <stop offset="0%"   stop-color="#606060"/>
      <stop offset="55%"  stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
  </defs>

  <!-- ═══════════════════════════════════════════
       WORDMARK
       Tuned for real-browser Arial Black Italic 200 metrics
       (Inkscape/ImageMagick previews render narrower).
         "C"        x=40
         GEAR       centre (325, 162), outer radius 76 (d=152)
                    ≈ cap height 145
         "RNEY'S"   x=440
       AUTOMOTIVE SERVICES centred at x=565, y=310
       viewBox wider so descenders/apostrophe aren't clipped
       ═══════════════════════════════════════════ -->

  <!-- Static "C" -->
  <text
    x="40" y="230"
    font-family="'Arial Black', 'Helvetica Neue', Impact, sans-serif"
    font-weight="900"
    font-style="italic"
    font-size="210"
    letter-spacing="-10"
    fill="url(#chromeText)"
    stroke="#2A2A2A"
    stroke-width="2"
    stroke-linejoin="round"
    paint-order="stroke"
  >C</text>

  <!-- Static "RNEY'S" -->
  <text
    x="440" y="230"
    font-family="'Arial Black', 'Helvetica Neue', Impact, sans-serif"
    font-weight="900"
    font-style="italic"
    font-size="210"
    letter-spacing="-10"
    fill="url(#chromeText)"
    stroke="#2A2A2A"
    stroke-width="2"
    stroke-linejoin="round"
    paint-order="stroke"
  >RNEY&#8217;S</text>

  <!-- ═══════════════════════════════════════════
       SPINNING GEAR — inline as the "O"
       Centre at (292, 160). Outer radius 62
       so full height ~124 fits within cap-height.
       Clear space either side of the gear.
       ═══════════════════════════════════════════ -->
  <g transform="translate(325, 162)">
    <g class="corneys-gear-spin" style="transform-origin: 0 0;">
      <!-- 16 trapezoidal teeth, each vertical then rotated -->
      <g fill="url(#gearTooth)" stroke="#3E3E3E" stroke-width="1.2" stroke-linejoin="round">
        <g transform="rotate(0)"><polygon points="-11,-78 11,-78 9.5,-66 -9.5,-66"/></g>
        <g transform="rotate(22.5)"><polygon points="-11,-78 11,-78 9.5,-66 -9.5,-66"/></g>
        <g transform="rotate(45)"><polygon points="-11,-78 11,-78 9.5,-66 -9.5,-66"/></g>
        <g transform="rotate(67.5)"><polygon points="-11,-78 11,-78 9.5,-66 -9.5,-66"/></g>
        <g transform="rotate(90)"><polygon points="-11,-78 11,-78 9.5,-66 -9.5,-66"/></g>
        <g transform="rotate(112.5)"><polygon points="-11,-78 11,-78 9.5,-66 -9.5,-66"/></g>
        <g transform="rotate(135)"><polygon points="-11,-78 11,-78 9.5,-66 -9.5,-66"/></g>
        <g transform="rotate(157.5)"><polygon points="-11,-78 11,-78 9.5,-66 -9.5,-66"/></g>
        <g transform="rotate(180)"><polygon points="-11,-78 11,-78 9.5,-66 -9.5,-66"/></g>
        <g transform="rotate(202.5)"><polygon points="-11,-78 11,-78 9.5,-66 -9.5,-66"/></g>
        <g transform="rotate(225)"><polygon points="-11,-78 11,-78 9.5,-66 -9.5,-66"/></g>
        <g transform="rotate(247.5)"><polygon points="-11,-78 11,-78 9.5,-66 -9.5,-66"/></g>
        <g transform="rotate(270)"><polygon points="-11,-78 11,-78 9.5,-66 -9.5,-66"/></g>
        <g transform="rotate(292.5)"><polygon points="-11,-78 11,-78 9.5,-66 -9.5,-66"/></g>
        <g transform="rotate(315)"><polygon points="-11,-78 11,-78 9.5,-66 -9.5,-66"/></g>
        <g transform="rotate(337.5)"><polygon points="-11,-78 11,-78 9.5,-66 -9.5,-66"/></g>
      </g>

      <!-- Main body -->
      <circle r="66" fill="url(#gearBody)" stroke="#2A2A2A" stroke-width="1.5"/>
      <!-- Inner dark ring -->
      <circle r="48" fill="#161616" stroke="#3A3A3A" stroke-width="1"/>

      <!-- Bolt/rivet marks around inner ring (12) -->
      <g fill="#EAEAEA" stroke="#3A3A3A" stroke-width="0.4">
        <circle cx="0"       cy="-41"    r="2.2"/>
        <circle cx="20.5"    cy="-35.5"  r="2.2"/>
        <circle cx="35.5"    cy="-20.5"  r="2.2"/>
        <circle cx="41"      cy="0"      r="2.2"/>
        <circle cx="35.5"    cy="20.5"   r="2.2"/>
        <circle cx="20.5"    cy="35.5"   r="2.2"/>
        <circle cx="0"       cy="41"     r="2.2"/>
        <circle cx="-20.5"   cy="35.5"   r="2.2"/>
        <circle cx="-35.5"   cy="20.5"   r="2.2"/>
        <circle cx="-41"     cy="0"      r="2.2"/>
        <circle cx="-35.5"   cy="-20.5"  r="2.2"/>
        <circle cx="-20.5"   cy="-35.5"  r="2.2"/>
      </g>

      <!-- Red accent ring -->
      <circle r="30" fill="none" stroke="#E31E24" stroke-width="3.5"/>

      <!-- Inner hub face -->
      <circle r="24" fill="url(#gearHub)" stroke="#1A1A1A" stroke-width="1"/>

      <!-- Centre bore -->
      <circle r="6" fill="#E31E24"/>
      <circle r="2.3" fill="#0A0A0A"/>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════
       STATIC "AUTOMOTIVE SERVICES"
       Centred under the full wordmark.
       Wordmark spans roughly 70→820, centre ≈445.
       ═══════════════════════════════════════════ -->
  <text
    x="640" y="320"
    text-anchor="middle"
    font-family="'Arial Narrow', 'Arial', 'Helvetica Neue', sans-serif"
    font-size="58"
    font-weight="700"
    font-style="italic"
    fill="#E31E24"
    letter-spacing="10"
  >AUTOMOTIVE SERVICES</text>
</svg>
