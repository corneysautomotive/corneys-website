<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280" role="img" aria-label="Corney's Automotive Services logo">
  <defs>
    <style>
      @keyframes gear-rotate {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      .gear-spin {
        transform-origin: 200px 128px;
        animation: gear-rotate 8s linear infinite;
      }
    </style>

    <!-- Metallic gradient fixed in userSpaceOnUse — stays put while gear spins for sheen effect -->
    <linearGradient id="gMetal" x1="0" y1="38" x2="0" y2="218" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#D8D8D8"/>
      <stop offset="25%"  stop-color="#A0A0A0"/>
      <stop offset="60%"  stop-color="#606060"/>
      <stop offset="100%" stop-color="#303030"/>
    </linearGradient>

    <!-- Hub radial gradient -->
    <radialGradient id="gHub" cx="38%" cy="32%" r="62%">
      <stop offset="0%"   stop-color="#AAAAAA"/>
      <stop offset="50%"  stop-color="#555555"/>
      <stop offset="100%" stop-color="#1E1E1E"/>
    </radialGradient>

    <!-- Tooth gradient - slightly lighter than body -->
    <linearGradient id="gTooth" x1="0" y1="38" x2="0" y2="218" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E0E0E0"/>
      <stop offset="40%"  stop-color="#B0B0B0"/>
      <stop offset="100%" stop-color="#484848"/>
    </linearGradient>
  </defs>

  <!-- ═══════════════════════════════════════════
       SPINNING GEAR GROUP — centered at (200,128)
       12-tooth gear: outer_r=90, valley_r=72
       Points computed: angle = i*15° - 90°
       even-i = outer_r, odd-i = inner_r
       ═══════════════════════════════════════════ -->
  <g class="gear-spin">

    <!-- Gear body: 12-tooth polygon (24 vertices alternating outer/inner radius) -->
    <polygon
      points="
        200,38
        218.63,58.45
        245,50.06
        250.91,77.09
        277.94,83
        269.55,109.37
        290,128
        269.55,146.63
        277.94,173
        250.91,178.91
        245,205.94
        218.63,197.55
        200,218
        181.37,197.55
        155,205.94
        149.09,178.91
        122.06,173
        130.45,146.63
        110,128
        130.45,109.37
        122.06,83
        149.09,77.09
        155,50.06
        181.37,58.45
      "
      fill="url(#gMetal)"
      stroke="#5A5A5A"
      stroke-width="1.5"
      stroke-linejoin="round"
    />

    <!-- Hub outer edge definition ring -->
    <circle cx="200" cy="128" r="63" fill="#333" stroke="#5A5A5A" stroke-width="1.5"/>

    <!-- Hub metallic face -->
    <circle cx="200" cy="128" r="61" fill="url(#gHub)"/>

    <!-- Red accent ring — signature Corney's detail -->
    <circle cx="200" cy="128" r="51" fill="none" stroke="#E31E24" stroke-width="3" opacity="0.92"/>

    <!-- Inner dark recess -->
    <circle cx="200" cy="128" r="37" fill="#161616" stroke="#3A3A3A" stroke-width="1"/>

    <!-- Inner hub cap -->
    <circle cx="200" cy="128" r="23" fill="url(#gHub)" stroke="#555" stroke-width="1"/>

    <!-- Spoke arms (4 spokes at 90°) -->
    <line x1="200" y1="106" x2="200" y2="91"  stroke="#404040" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="200" y1="150" x2="200" y2="165" stroke="#404040" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="178" y1="128" x2="163" y2="128" stroke="#404040" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="222" y1="128" x2="237" y2="128" stroke="#404040" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Centre bore -->
    <circle cx="200" cy="128" r="9"  fill="#111111" stroke="#E31E24" stroke-width="1.5"/>
    <!-- Centre pin -->
    <circle cx="200" cy="128" r="4"  fill="#E31E24"/>
  </g>

  <!-- ═══════════════════════════════════════════
       STATIC TEXT — never moves
       ═══════════════════════════════════════════ -->

  <!-- CORNEY'S — white, bold, centred below gear -->
  <text
    x="200" y="250"
    text-anchor="middle"
    dominant-baseline="auto"
    font-family="Impact, 'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="40"
    font-weight="900"
    fill="#FFFFFF"
    letter-spacing="3"
  >CORNEY&#x2019;S</text>

  <!-- AUTOMOTIVE SERVICES — red, small caps, centred -->
  <text
    x="200" y="270"
    text-anchor="middle"
    dominant-baseline="auto"
    font-family="'Arial', 'Helvetica Neue', Helvetica, sans-serif"
    font-size="11"
    font-weight="700"
    fill="#E31E24"
    letter-spacing="4"
  >AUTOMOTIVE SERVICES</text>
</svg>
